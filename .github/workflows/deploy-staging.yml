# .github/workflows/deploy-staging.yml
name: Deploy Backend (Staging)

on:
  push:
    branches: ["develop"]

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: appdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/appdb_test?schema=public
      NODE_ENV: test
      NPM_CONFIG_PRODUCTION: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install deps (with dev)
        run: npm ci --include=dev

      - name: Prisma generate
        run: npx prisma generate

      - name: Sync DB schema (CI)
        run: npx prisma db push

      - name: Test + Coverage Gate (60%)
        run: npm run test:cov -- --coverageThreshold='{"global":{"branches":60,"functions":60,"lines":60,"statements":60}}'

      - name: Trigger Render Deploy (Staging)
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RENDER_STAGING_DEPLOY_HOOK_URL"
            exit 1
          fi
          curl -fsS "$DEPLOY_HOOK_URL"