services:
  db:
    image: postgres:16
    container_name: restaurante_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      # OJO: dentro de docker, el host es el nombre del servicio "db"
      DATABASE_URL: postgresql://app:app@db:5432/appdb?schema=public
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    environment:
      # Dentro de docker, el backend se alcanza por el nombre del servicio "backend"
      VITE_API_URL: http://backend:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: